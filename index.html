<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARTIn - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .tagline {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .tab-container {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .btn:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
        }

        .btn-google {
            background: #db4437;
            margin-top: 10px;
        }

        .btn-google:hover {
            background: #c53929;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #666;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .switch-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            z-index: 9999;
        }

        .toast.success { background: #48bb78; }
        .toast.error { background: #f56565; }
        .toast.info { background: #4299e1; }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            text-align: center;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <div class="loader-spinner"></div>
            <div style="color: #667eea; font-size: 24px; font-weight: bold;">MARTIn</div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Main Container -->
    <div class="container">
        <div class="logo">MARTIn</div>
        <div class="tagline">Connect with the world</div>

        <!-- Tabs -->
        <div class="tab-container">
            <div class="tab active" onclick="showTab('login')">Login</div>
            <div class="tab" onclick="showTab('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>
            <button class="btn" onclick="handleLogin()" id="login-btn">Sign In</button>
            
            <div class="divider">
                <span>or</span>
            </div>
            
            <button class="btn btn-google" onclick="handleGoogleLogin()" id="google-btn">Continue with Google</button>
            
            <div class="switch-link">
                Don't have an account? <a href="#" onclick="showTab('signup')">Sign Up</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Create a password">
                <small style="color: #666; display: block; margin-top: 5px;">Must be at least 8 characters</small>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="signup-confirm" placeholder="Confirm your password">
            </div>
            <div class="form-group" style="display: flex; align-items: center;">
                <input type="checkbox" id="terms" style="width: auto; margin-right: 10px;">
                <label style="margin: 0;">I agree to the Terms of Service</label>
            </div>
            <button class="btn" onclick="handleSignup()" id="signup-btn">Sign Up</button>
            
            <div class="switch-link">
                Already have an account? <a href="#" onclick="showTab('login')">Sign In</a>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase Configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            updateProfile
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc,
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyArQ7GwpIp4AeVVYYR5GDKDv4E-kL3SBTU",
            authDomain: "martin-5e3c1.firebaseapp.com",
            projectId: "martin-5e3c1",
            storageBucket: "martin-5e3c1.firebasestorage.app",
            messagingSenderId: "132488885797",
            appId: "1:132488885797:web:605b754951ddbb0bbc71cc"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        console.log('Firebase initialized');

        // Toast function
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.remove();
                }
            }, 3000);
        }

        // Save user to Firestore
        async function saveUserToFirestore(user) {
            if (!user) return;
            
            try {
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        name: user.displayName || 'User',
                        avatar: user.photoURL || '',
                        bio: '',
                        createdAt: serverTimestamp(),
                        lastLogin: serverTimestamp(),
                        online: true,
                        followers: [],
                        following: [],
                        postsCount: 0
                    });
                    console.log('User saved to Firestore');
                } else {
                    await setDoc(userRef, {
                        lastLogin: serverTimestamp(),
                        online: true
                    }, { merge: true });
                    console.log('User updated in Firestore');
                }
            } catch (error) {
                console.error('Firestore error:', error);
            }
        }

        // Auth state listener
        onAuthStateChanged(auth, (user) => {
            console.log('Auth state:', user ? 'Logged in' : 'Logged out');
            
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 500);
            }
            
            if (user) {
                saveUserToFirestore(user);
                
                // Redirect to dashboard
                if (!window.location.pathname.includes('dashboard.html')) {
                    window.location.href = 'dashboard.html';
                }
            }
        });

        // Make functions global
        window.showTab = (tab) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            if (!email || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('Login successful!', 'success');
            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                
                let message = 'Login failed';
                if (error.code === 'auth/user-not-found') message = 'User not found';
                else if (error.code === 'auth/wrong-password') message = 'Wrong password';
                else message = error.message;
                
                showToast(message, 'error');
                console.error(error);
            }
        };

        window.handleSignup = async () => {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const terms = document.getElementById('terms').checked;
            const btn = document.getElementById('signup-btn');
            
            if (!name || !email || !password || !confirm) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            
            if (password.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                return;
            }
            
            if (password !== confirm) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            if (!terms) {
                showToast('Please accept the Terms of Service', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                await updateProfile(user, { displayName: name });
                await saveUserToFirestore(user);
                
                showToast('Account created!', 'success');
                
                // Force redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Sign Up';
                
                let message = 'Signup failed';
                if (error.code === 'auth/email-already-in-use') message = 'Email already registered';
                else message = error.message;
                
                showToast(message, 'error');
                console.error(error);
            }
        };

        window.handleGoogleLogin = async () => {
            const btn = document.getElementById('google-btn');
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            try {
                await signInWithPopup(auth, provider);
                showToast('Login successful!', 'success');
            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Continue with Google';
                showToast('Google login failed', 'error');
                console.error(error);
            }
        };

        console.log('App loaded');
    </script>
</body>
      </html>
